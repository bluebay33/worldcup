name: 更新世界杯战报

# 在 GitHub 云端每 6 小时跑一次：拉 ESPN 真实数据 -> 生成页面 -> 部署到 Cloudflare Pages。
# 全程纯 Python + wrangler，不依赖你的电脑、不使用 Claude。
on:
  schedule:
    - cron: '0 */6 * * *'    # UTC 的 0/6/12/18 点，约合北京时间 08/14/20/02 点
  workflow_dispatch: {}        # 允许在 Actions 页面手动点「Run workflow」
  push:
    branches: [ main ]         # 推代码到 main 时也跑一次（方便首次验证）

permissions:
  contents: read               # 只读仓库，最小权限

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉 ESPN 真实数据
        run: python fetch_espn.py

      - name: 生成页面
        run: python build.py

      - name: 整理发布目录（只放静态文件）
        run: |
          mkdir -p _site
          cp index.html report.html data.json manifest.webmanifest icon-192.png icon-512.png apple-touch-icon.png _site/

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=worldcup --branch=main
