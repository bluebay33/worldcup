name: 更新世界杯战报

# 按需刷新:每小时触发一次「看一眼」,但只有临近比赛(gate.py 判断)时才真正拉数据+部署。
# 小组赛比赛密集 -> 活跃刷新多;淘汰赛稀疏 -> 大多空转跳过。空转那次只 checkout+判断,几乎不耗额度。
# 全程纯 Python(标准库,无需装依赖)+ wrangler,不依赖你的电脑、不使用 Claude。
on:
  schedule:
    # 据实际赛程(data.json 104 场)核定:开球只在 UTC 0-4 和 16-23 两簇,UTC 5-15 无开球。
    # 跳过 UTC 10-14(=美东 6:00-10:00)死时段;保留 UTC 7-9 多两小时,给早场比赛留时间抓 TSN 集锦视频;
    # 保留 UTC 15:00 以提前刷新 16:00 首场。每天少触发 5 次(约 21%)。是否真正刷新仍由 gate.py 决定。
    # 世界杯期间(6/11-7/19)美东全程 EDT(UTC-4),整届不切夏令时,故窗口固定无误。
    - cron: '0 0-9,15-23 * * *'
  workflow_dispatch: {}          # 手动触发(强制刷新)
  push:
    branches: [ main ]           # 推代码到 main 也跑(强制刷新,方便验证)

permissions:
  contents: read                 # 只读仓库,最小权限

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 按比赛日程判断是否需要刷新
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: python3 gate.py

      - name: 拉 ESPN 真实数据
        if: steps.gate.outputs.active == 'true'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 fetch_espn.py

      - name: 生成页面
        if: steps.gate.outputs.active == 'true'
        run: python3 build.py

      - name: 整理发布目录（只放静态文件）
        if: steps.gate.outputs.active == 'true'
        run: |
          mkdir -p _site
          cp index.html report.html data.json privacy.html manifest.webmanifest sw.js icon-192.png icon-512.png apple-touch-icon.png _site/

      - name: 部署到 Cloudflare Pages
        if: steps.gate.outputs.active == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=worldcup --branch=main
